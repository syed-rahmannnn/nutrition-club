<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Debug - UMS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .debug-section {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #667eea;
        }
        .status {
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        #console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 3px 0;
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>Mobile Debug Tool</h1>
    
    <div class="debug-section">
        <h2>Device Information</h2>
        <div id="device-info"></div>
    </div>
    
    <div class="debug-section">
        <h2>Configuration Check</h2>
        <div id="config-check"></div>
    </div>
    
    <div class="debug-section">
        <h2>Network Test</h2>
        <button onclick="testConnection()">Test Backend Connection</button>
        <div id="network-status"></div>
    </div>
    
    <div class="debug-section">
        <h2>Console Output</h2>
        <button onclick="clearConsole()">Clear Console</button>
        <div id="console-output"></div>
    </div>
    
    <script src="config.js"></script>
    <script>
        // Capture console logs
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addLog(type, ...args) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = type === 'error' ? '#ff6b6b' : type === 'warn' ? '#ffd93d' : '#d4d4d4';
            entry.textContent = `[${type.toUpperCase()}] ${new Date().toLocaleTimeString()}: ${args.join(' ')}`;
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog('log', ...args);
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog('error', ...args);
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addLog('warn', ...args);
        };
        
        function clearConsole() {
            consoleOutput.innerHTML = '';
        }
        
        // Display device information
        function displayDeviceInfo() {
            const info = document.getElementById('device-info');
            const userAgent = navigator.userAgent;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
            
            info.innerHTML = `
                <div class="status info">
                    <strong>User Agent:</strong> ${userAgent}
                </div>
                <div class="status info">
                    <strong>Platform:</strong> ${navigator.platform}
                </div>
                <div class="status info">
                    <strong>Device Type:</strong> ${isMobile ? 'Mobile' : 'Desktop'}
                </div>
                <div class="status info">
                    <strong>Screen Size:</strong> ${window.innerWidth}x${window.innerHeight}
                </div>
                <div class="status info">
                    <strong>Online:</strong> ${navigator.onLine ? 'Yes' : 'No'}
                </div>
            `;
            
            console.log('Device Info:', { userAgent, platform: navigator.platform, isMobile });
        }
        
        // Check configuration
        function checkConfig() {
            const configDiv = document.getElementById('config-check');
            
            if (typeof APPS_SCRIPT_URL === 'undefined') {
                configDiv.innerHTML = '<div class="status error">❌ APPS_SCRIPT_URL is not defined!</div>';
                console.error('Config check failed: APPS_SCRIPT_URL not defined');
            } else {
                configDiv.innerHTML = `
                    <div class="status success">✓ APPS_SCRIPT_URL is defined</div>
                    <div class="status info">
                        <strong>URL:</strong> ${APPS_SCRIPT_URL}
                    </div>
                `;
                console.log('Config check passed:', APPS_SCRIPT_URL);
            }
        }
        
        // Test connection to backend
        async function testConnection() {
            const statusDiv = document.getElementById('network-status');
            statusDiv.innerHTML = '<div class="status info">Testing connection...</div>';
            console.log('Starting connection test to:', APPS_SCRIPT_URL);
            
            try {
                const today = new Date().toISOString().split('T')[0];
                const url = `${APPS_SCRIPT_URL}?action=getMembers&date=${today}`;
                console.log('Test URL:', url);
                
                const startTime = Date.now();
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: 'follow',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                console.log('Response received in', duration, 'ms');
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Data received:', data);
                
                statusDiv.innerHTML = `
                    <div class="status success">✓ Connection successful!</div>
                    <div class="status info">
                        <strong>Response Time:</strong> ${duration}ms<br>
                        <strong>Status:</strong> ${response.status}<br>
                        <strong>Success:</strong> ${data.success ? 'Yes' : 'No'}<br>
                        <strong>Members Count:</strong> ${data.members ? data.members.length : 0}
                    </div>
                `;
                
            } catch (error) {
                console.error('Connection test failed:', error);
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ Connection failed!<br>
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        }
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', function() {
            console.log('Mobile Debug Tool Loaded');
            displayDeviceInfo();
            checkConfig();
        });
    </script>
</body>
</html>
