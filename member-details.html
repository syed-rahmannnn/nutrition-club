<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Details - Nutrition Club</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .placeholder-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .placeholder-content {
            background: white;
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }
        .placeholder-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .placeholder-title {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .placeholder-text {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .btn-back {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-back:hover {
            background: #5568d3;
        }
    </style>
</head>
<body class="placeholder-page">
    <div class="placeholder-content">
        <div class="placeholder-icon">👥</div>
        <h1 class="placeholder-title">Member Details</h1>
        <p class="placeholder-text">View and manage detailed member information. This feature is under development.</p>
        <a href="home.html" class="btn-back">← Back to Home</a>
    </div>
    <script>
        // Check authentication
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
